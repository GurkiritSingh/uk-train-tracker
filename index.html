<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Train Deal Finder — Search Any Route</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #070b14;
            --bg-base: #0c1220;
            --bg-card: #111827;
            --bg-card-hover: #1a2332;
            --border: #1e293b;
            --border-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --green: #34d399;
            --green-dim: #059669;
            --yellow: #fbbf24;
            --red: #f87171;
            --radius: 14px;
            --radius-sm: 10px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; top: -40%; left: -20%; width: 80%; height: 80%;
            background: radial-gradient(ellipse, rgba(59,130,246,0.06) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        body::after {
            content: '';
            position: fixed; bottom: -30%; right: -20%; width: 70%; height: 70%;
            background: radial-gradient(ellipse, rgba(139,92,246,0.04) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        header {
            position: relative;
            padding: 44px 24px 40px;
            text-align: center;
            background: linear-gradient(180deg, #0f172a 0%, var(--bg-deep) 100%);
            border-bottom: 1px solid var(--border);
            overflow: hidden; z-index: 1;
        }

        header::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(59,130,246,0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        .header-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 56px; height: 56px; border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            font-size: 1.6rem; margin-bottom: 16px;
            box-shadow: 0 8px 30px rgba(59,130,246,0.3);
        }

        header h1 {
            font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, var(--accent-light) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        header p { color: var(--text-muted); font-size: 0.95rem; font-weight: 500; }

        .container {
            position: relative; z-index: 1;
            max-width: 1140px; margin: 0 auto; padding: 28px 20px 60px;
        }

        /* Tabs */
        .tabs {
            display: flex; gap: 6px; margin-bottom: 28px; flex-wrap: wrap;
            background: var(--bg-card); padding: 6px; border-radius: 14px; border: 1px solid var(--border);
        }

        .tab {
            padding: 10px 20px; background: transparent; border: none; border-radius: 10px;
            cursor: pointer; font-size: 0.88rem; font-weight: 600;
            color: var(--text-muted); transition: all 0.25s ease;
        }

        .tab:hover { color: var(--text-secondary); background: rgba(255,255,255,0.03); }
        .tab.active {
            background: var(--accent); color: white;
            box-shadow: 0 4px 16px rgba(59,130,246,0.3);
        }

        .tab-content { display: none; animation: fadeIn 0.35s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Search Panel */
        .search-panel {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .search-panel h2 {
            font-size: 1.15rem; font-weight: 700; margin-bottom: 20px;
        }

        .search-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;
        }

        .search-field { display: flex; flex-direction: column; gap: 6px; }
        .search-field.full { grid-column: 1 / -1; }

        .search-field label {
            font-size: 0.75rem; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.08em;
        }

        .search-field input, .search-field select {
            padding: 12px 14px; background: var(--bg-base);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--text-primary); font-size: 0.9rem; font-family: inherit;
            transition: border-color 0.2s;
        }

        .search-field input:focus, .search-field select:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* Station autocomplete */
        .station-input-wrap { position: relative; }

        .station-input-wrap input {
            width: 100%; padding: 12px 14px; background: var(--bg-base);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--text-primary); font-size: 0.9rem; font-family: inherit;
            transition: border-color 0.2s;
        }

        .station-input-wrap input:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .autocomplete-list {
            position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-sm); margin-top: 4px;
            max-height: 240px; overflow-y: auto; display: none;
            box-shadow: var(--shadow-lg);
        }

        .autocomplete-list.open { display: block; }

        .autocomplete-item {
            padding: 10px 14px; cursor: pointer; font-size: 0.88rem;
            display: flex; justify-content: space-between; align-items: center;
            transition: background 0.15s;
        }

        .autocomplete-item:hover, .autocomplete-item.highlighted {
            background: var(--accent-glow); color: var(--accent-light);
        }

        .autocomplete-item.group-item {
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }

        .autocomplete-item .station-code {
            font-size: 0.72rem; font-weight: 700; color: var(--text-muted);
            background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 4px;
            flex-shrink: 0;
        }

        .swap-btn {
            align-self: center; justify-self: center;
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--accent); cursor: pointer; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; grid-column: 1 / -1;
        }

        .swap-btn:hover { background: var(--accent-glow); border-color: var(--accent); transform: rotate(180deg); }

        .search-btn {
            width: 100%; padding: 14px 32px; background: linear-gradient(135deg, var(--accent), #2563eb);
            border: none; border-radius: var(--radius-sm); color: white;
            font-weight: 700; font-size: 0.95rem; cursor: pointer;
            box-shadow: 0 4px 16px rgba(59,130,246,0.3);
            transition: all 0.2s; font-family: inherit;
        }

        .search-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(59,130,246,0.4); }
        .search-btn:active { transform: translateY(0); }

        /* Results */
        .results-section { display: none; }
        .results-section.visible { display: block; animation: fadeIn 0.4s ease; }

        .results-header {
            margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
        }
        .results-header h3 { font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; }
        .route-badge {
            font-size: 0.78rem; color: var(--text-muted); font-weight: 500;
        }

        .tip-banner {
            display: flex; gap: 12px; align-items: flex-start;
            padding: 16px 18px; border-radius: var(--radius-sm);
            border: 1px solid rgba(52,211,153,0.15);
            background: rgba(52,211,153,0.06);
            margin-bottom: 24px; font-size: 0.88rem; color: var(--green); line-height: 1.6;
        }
        .tip-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }

        .price-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px; margin-bottom: 24px;
        }

        .price-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 22px;
            transition: all 0.2s; position: relative;
        }
        .price-card:hover { border-color: var(--border-hover); }
        .price-card.highlight { border-color: rgba(52,211,153,0.3); background: rgba(52,211,153,0.04); }

        .fare-type {
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 8px;
        }
        .fare-price { font-size: 2rem; font-weight: 800; margin-bottom: 6px; }
        .price-cheap { color: var(--green); }
        .price-mid { color: var(--yellow); }
        .price-expensive { color: var(--red); }
        .fare-note { font-size: 0.78rem; color: var(--text-muted); line-height: 1.5; }
        .fare-badge {
            display: inline-block; padding: 3px 10px; border-radius: 6px;
            font-size: 0.7rem; font-weight: 700; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 0.06em;
        }

        /* Booking links */
        .booking-links {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px; margin-bottom: 24px;
        }

        .booking-link {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 16px; border-radius: var(--radius-sm);
            background: var(--bg-card); border: 1px solid var(--border);
            text-decoration: none; color: var(--text-primary);
            transition: all 0.2s;
        }
        .booking-link:hover { background: var(--bg-card-hover); border-color: var(--border-hover); }
        .booking-link.primary { border-color: rgba(59,130,246,0.2); background: rgba(59,130,246,0.04); }

        .bl-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }
        .bl-info { flex: 1; min-width: 0; }
        .bl-name { font-weight: 700; font-size: 0.9rem; }
        .bl-desc { font-size: 0.78rem; color: var(--text-muted); }
        .bl-arrow {
            color: var(--text-muted); font-weight: 600;
            transition: transform 0.2s; flex-shrink: 0;
        }
        .booking-link:hover .bl-arrow { transform: translateX(4px); color: var(--accent); }

        /* Tips */
        .tips-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px;
        }
        .tip-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 24px;
            transition: all 0.25s; box-shadow: var(--shadow);
        }
        .tip-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
        .tip-card h3 {
            font-size: 1rem; font-weight: 700; color: var(--accent-light);
            margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
        }
        .tip-card ul { list-style: none; font-size: 0.88rem; color: var(--text-secondary); }
        .tip-card li { padding: 6px 0; padding-left: 20px; position: relative; line-height: 1.5; }
        .tip-card li::before {
            content: ''; position: absolute; left: 0; top: 12px;
            width: 6px; height: 6px; border-radius: 50%; background: var(--green);
        }

        /* Links */
        .links-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px;
        }
        .link-group {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow);
        }
        .link-group h3 {
            font-size: 1rem; font-weight: 700; margin-bottom: 16px;
            padding-bottom: 12px; border-bottom: 1px solid var(--border);
        }
        .link-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px; border-radius: var(--radius-sm);
            text-decoration: none; color: var(--text-secondary);
            font-size: 0.9rem; transition: all 0.2s; margin-bottom: 4px;
        }
        .link-item:hover { background: rgba(255,255,255,0.04); color: var(--text-primary); }
        .link-icon {
            width: 38px; height: 38px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; flex-shrink: 0;
        }
        .link-label { font-weight: 600; }
        .link-desc { font-size: 0.78rem; color: var(--text-muted); }

        /* Popular routes */
        .popular-routes {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px; margin-bottom: 24px;
        }
        .popular-route {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 16px;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 14px;
        }
        .popular-route:hover {
            border-color: var(--accent); background: var(--accent-glow); transform: translateY(-2px);
        }
        .popular-route .pr-icon {
            width: 42px; height: 42px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; flex-shrink: 0;
        }
        .popular-route .pr-info h4 { font-size: 0.9rem; font-weight: 700; margin-bottom: 2px; }
        .popular-route .pr-info p { font-size: 0.78rem; color: var(--text-muted); }

        /* Recent searches */
        .recent-searches { margin-bottom: 24px; }
        .recent-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }
        .recent-header h3 {
            font-size: 0.75rem; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.08em;
        }
        .recent-clear {
            font-size: 0.75rem; color: var(--accent); cursor: pointer;
            background: none; border: none; font-family: inherit; font-weight: 600;
        }
        .recent-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .recent-chip {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 14px; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 100px; cursor: pointer; font-size: 0.82rem;
            color: var(--text-secondary); transition: all 0.2s;
        }
        .recent-chip:hover { border-color: var(--accent); color: var(--accent-light); }
        .recent-chip span { font-size: 0.85rem; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 700px) {
            header { padding: 32px 16px 28px; }
            header h1 { font-size: 1.5rem; }
            .header-icon { width: 48px; height: 48px; font-size: 1.3rem; }
            .container { padding: 20px 14px 40px; }
            .tabs { gap: 4px; padding: 4px; }
            .tab { padding: 8px 14px; font-size: 0.82rem; }
            .search-grid { grid-template-columns: 1fr; }
            .price-cards, .booking-links, .tips-grid, .links-grid, .popular-routes { grid-template-columns: 1fr; }
            .search-panel { padding: 20px; }
        }

        @media (max-width: 400px) {
            .tabs { flex-direction: column; }
            .tab { text-align: center; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-icon">🚆</div>
        <h1>UK Train Deal Finder</h1>
        <p>Search any route across the UK — find the cheapest fares</p>
    </header>

    <div class="container">
        <div class="tabs">
            <div class="tab active" data-tab="search">Search Prices</div>
            <div class="tab" data-tab="tips">Booking Tips</div>
            <div class="tab" data-tab="links">Useful Links</div>
        </div>

        <!-- SEARCH TAB -->
        <div class="tab-content active" id="search">
            <div class="search-panel">
                <h2>Find Live Train Prices</h2>
                <div class="search-grid">
                    <div class="search-field">
                        <label>From</label>
                        <div class="station-input-wrap">
                            <input type="text" id="fromStation" placeholder="e.g. London Euston" autocomplete="off">
                            <div class="autocomplete-list" id="fromList"></div>
                        </div>
                    </div>
                    <div class="search-field">
                        <label>To</label>
                        <div class="station-input-wrap">
                            <input type="text" id="toStation" placeholder="e.g. Manchester Piccadilly" autocomplete="off">
                            <div class="autocomplete-list" id="toList"></div>
                        </div>
                    </div>
                    <button class="swap-btn" id="swapBtn" title="Swap stations">⇅</button>
                    <div class="search-field">
                        <label>Date</label>
                        <input type="date" id="searchDate">
                    </div>
                    <div class="search-field">
                        <label>Time</label>
                        <select id="searchTime">
                            <option value="0600">06:00</option>
                            <option value="0700">07:00</option>
                            <option value="0800">08:00</option>
                            <option value="0900">09:00</option>
                            <option value="1000" selected>10:00</option>
                            <option value="1100">11:00</option>
                            <option value="1200">12:00</option>
                            <option value="1300">13:00</option>
                            <option value="1400">14:00</option>
                            <option value="1500">15:00</option>
                            <option value="1600">16:00</option>
                            <option value="1700">17:00</option>
                            <option value="1800">18:00</option>
                            <option value="1900">19:00</option>
                            <option value="2000">20:00</option>
                            <option value="2100">21:00</option>
                        </select>
                    </div>
                </div>
                <button class="search-btn" id="searchBtn">🔍 Search Prices</button>
            </div>

            <!-- Recent Searches -->
            <div class="recent-searches" id="recentSection" style="display:none;">
                <div class="recent-header">
                    <h3>Recent Searches</h3>
                    <button class="recent-clear" id="clearRecent">Clear All</button>
                </div>
                <div class="recent-list" id="recentList"></div>
            </div>

            <!-- Popular Routes -->
            <h3 style="font-size:0.75rem; color:var(--text-muted); margin-bottom:14px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em;">Popular Routes</h3>
            <div class="popular-routes" id="popularRoutes"></div>

            <!-- Results -->
            <div class="results-section" id="resultsSection">
                <div id="resultsContent"></div>
            </div>
        </div>

        <!-- TIPS TAB -->
        <div class="tab-content" id="tips">
            <div class="tips-grid" id="tipsGrid"></div>
        </div>

        <!-- LINKS TAB -->
        <div class="tab-content" id="links">
            <div class="links-grid" id="linksGrid"></div>
        </div>
    </div>

<script>

// ══════════════════════════════════════
// AUTOCOMPLETE
// ══════════════════════════════════════
let selectedFrom = null;
let selectedTo = null;

function setupAutocomplete(inputId, listId, setFn) {
    const input = document.getElementById(inputId);
    const list = document.getElementById(listId);
    let highlightIndex = -1;
    let mouseIsDown = false;

    function doSearch() {
        const q = input.value.trim().toLowerCase();
        if (q.length < 1) { list.classList.remove('open'); return; }

        // Match groups and stations — prioritise groups + starts-with matches
        const startsWithGroups = STATION_GROUPS.filter(s => s.name.toLowerCase().startsWith(q));
        const startsWithStations = UK_STATIONS.filter(s =>
            s.name.toLowerCase().startsWith(q) || s.code.toLowerCase() === q
        );
        const containsStations = UK_STATIONS.filter(s =>
            !s.name.toLowerCase().startsWith(q) && s.code.toLowerCase() !== q &&
            (s.name.toLowerCase().includes(q) || s.code.toLowerCase().includes(q))
        );

        const matches = [...startsWithGroups, ...startsWithStations, ...containsStations].slice(0, 15);

        if (matches.length === 0) { list.classList.remove('open'); return; }

        highlightIndex = -1;
        list.innerHTML = matches.map((s, i) => {
            const isGroup = s.group;
            const badge = isGroup
                ? `<span class="station-code" style="background:var(--accent-glow);color:var(--accent-light);">GROUP</span>`
                : `<span class="station-code">${s.code}</span>`;
            const icon = isGroup ? '🏙️ ' : '';
            return `<div class="autocomplete-item ${isGroup ? 'group-item' : ''}" data-index="${i}" data-code="${s.code}" data-name="${s.name}">
                <span>${icon}${highlightMatch(s.name, q)}</span>
                ${badge}
            </div>`;
        }).join('');

        list.classList.add('open');
    }

    // Use mousedown instead of click — fires before blur
    list.addEventListener('mousedown', (e) => {
        e.preventDefault(); // prevent blur from firing
        const item = e.target.closest('.autocomplete-item');
        if (item) {
            input.value = item.dataset.name;
            setFn({ name: item.dataset.name, code: item.dataset.code });
            list.classList.remove('open');
        }
    });

    // Touch support
    list.addEventListener('touchstart', (e) => {
        const item = e.target.closest('.autocomplete-item');
        if (item) {
            e.preventDefault();
            input.value = item.dataset.name;
            setFn({ name: item.dataset.name, code: item.dataset.code });
            list.classList.remove('open');
        }
    });

    input.addEventListener('input', doSearch);

    input.addEventListener('keydown', (e) => {
        const items = list.querySelectorAll('.autocomplete-item');
        if (!items.length) return;

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            highlightIndex = Math.min(highlightIndex + 1, items.length - 1);
            updateHighlight(items, highlightIndex);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            highlightIndex = Math.max(highlightIndex - 1, 0);
            updateHighlight(items, highlightIndex);
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (highlightIndex >= 0) {
                const item = items[highlightIndex];
                input.value = item.dataset.name;
                setFn({ name: item.dataset.name, code: item.dataset.code });
                list.classList.remove('open');
            }
        } else if (e.key === 'Escape') {
            list.classList.remove('open');
        }
    });

    input.addEventListener('blur', () => {
        // Delay to allow mousedown/touchstart to fire first
        setTimeout(() => list.classList.remove('open'), 300);
    });

    input.addEventListener('focus', () => {
        if (input.value.length >= 1) doSearch();
    });
}

function updateHighlight(items, index) {
    items.forEach((it, i) => it.classList.toggle('highlighted', i === index));
    items[index]?.scrollIntoView({ block: 'nearest' });
}

function highlightMatch(text, query) {
    const idx = text.toLowerCase().indexOf(query);
    if (idx === -1) return text;
    return text.slice(0, idx) + '<strong style="color:var(--accent-light)">' + text.slice(idx, idx + query.length) + '</strong>' + text.slice(idx + query.length);
}

// ══════════════════════════════════════
// URL BUILDERS (work with any stations)
// ══════════════════════════════════════
function buildNationalRailUrl(fromCode, toCode, date, time) {
    const d = new Date(date);
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const yy = String(d.getFullYear()).slice(2);
    return `https://ojp.nationalrail.co.uk/service/timesandfares/${fromCode}/${toCode}/${dd}${mm}${yy}/${time}/dep`;
}

function buildTrainlineUrl(fromName, toName, date, time) {
    const hour = time.slice(0, 2);
    const min = time.slice(2);
    const dateStr = `${date}T${hour}:${min}:00`;
    return `https://www.thetrainline.com/book/results?journeySearchType=single&origin=${encodeURIComponent(fromName)}&destination=${encodeURIComponent(toName)}&outwardDate=${encodeURIComponent(dateStr)}&outwardDateType=departAfter&selectedTab=train&lang=en&adult=1`;
}

function buildSplitMyFareUrl(fromCode, toCode, date) {
    return `https://www.splitmyfare.co.uk/?from=${fromCode}&to=${toCode}&date=${date}`;
}

function buildTrainPalUrl(fromName, toName, date, time) {
    const d = new Date(date);
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const yyyy = d.getFullYear();
    return `https://www.mytrainpal.com/search?from=${encodeURIComponent(fromName)}&to=${encodeURIComponent(toName)}&depart=${yyyy}-${mm}-${dd}&time=${time.slice(0,2)}:${time.slice(2)}`;
}

// ══════════════════════════════════════
// PRICE ESTIMATION (heuristic for any route)
// ══════════════════════════════════════
function estimatePrices(fromCode, toCode, date, time) {
    const d = new Date(date);
    const day = d.getDay();
    const hour = parseInt(time.slice(0, 2));
    const isWeekend = day === 0 || day === 6;
    const isPeak = !isWeekend && ((hour >= 6 && hour < 10) || (hour >= 16 && hour < 19));
    const daysAhead = Math.floor((d - new Date()) / (1000 * 60 * 60 * 24));

    // Estimate distance-based pricing using station categories
    const dist = estimateDistance(fromCode, toCode);

    const advanceMin = Math.max(5, Math.round(dist * 0.08));
    const advanceMax = Math.max(10, Math.round(dist * 0.15));
    const offPeakPrice = Math.max(12, Math.round(dist * 0.2 * 100) / 100);
    const anytimePrice = Math.max(18, Math.round(dist * 0.32 * 100) / 100);

    let advanceAvailable = daysAhead >= 1;
    let advanceLikely = daysAhead >= 14;
    let advancePrice = advanceLikely ? advanceMin : (advanceAvailable ? advanceMax : null);

    return {
        advance: advancePrice ? `£${advancePrice}` : null,
        advanceAvailable,
        advanceLikely,
        offPeak: !isPeak ? `£${offPeakPrice.toFixed(2)}` : null,
        anytime: `£${anytimePrice.toFixed(2)}`,
        isPeak,
        isOffPeak: !isPeak,
        isWeekend,
        daysAhead,
        bestDeal: advanceLikely ? `Advance from ~£${advanceMin}` : (!isPeak ? `Off-Peak ~£${offPeakPrice.toFixed(2)}` : `Anytime ~£${anytimePrice.toFixed(2)}`)
    };
}

function estimateDistance(fromCode, toCode) {
    const a = stationRegions[fromCode] || { lat: 52.0, lon: -1.0 };
    const b = stationRegions[toCode] || { lat: 52.0, lon: -1.0 };
    const dlat = (b.lat - a.lat) * 69;
    const dlon = (b.lon - a.lon) * 43;
    return Math.max(20, Math.sqrt(dlat * dlat + dlon * dlon));
}

function getRecentSearches() {
    try { return JSON.parse(localStorage.getItem('trainRecentSearches') || '[]'); }
    catch { return []; }
}

function saveRecentSearch(from, to) {
    let recent = getRecentSearches();
    const key = `${from.code}-${to.code}`;
    recent = recent.filter(r => `${r.from.code}-${r.to.code}` !== key);
    recent.unshift({ from, to });
    if (recent.length > 6) recent = recent.slice(0, 6);
    localStorage.setItem('trainRecentSearches', JSON.stringify(recent));
    renderRecent();
}

function renderRecent() {
    const recent = getRecentSearches();
    const section = document.getElementById('recentSection');
    const list = document.getElementById('recentList');

    if (recent.length === 0) { section.style.display = 'none'; return; }

    section.style.display = 'block';
    list.innerHTML = recent.map(r =>
        `<div class="recent-chip" data-from='${JSON.stringify(r.from)}' data-to='${JSON.stringify(r.to)}'>
            <span>🚆</span> ${r.from.name} → ${r.to.name}

    ).join('');

    list.querySelectorAll('.recent-chip').forEach(chip => {
        chip.addEventListener('click', () => {

                `<a href="${l.url}" target="_blank" rel="noopener" class="link-item">
                    <div class="link-icon" style="background:${l.color}18; color:${l.color}">${l.icon}</div>
                    <div>
                        <div class="link-label">${l.label}</div>
                        <div class="link-desc">${l.desc}</div>
                    </div>
                </a>`
            ).join('')}
        </div>`
    ).join('');
}

// ══════════════════════════════════════
// TABS
// ══════════════════════════════════════
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
    });
});

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
(function init() {
    // Setup autocomplete
    setupAutocomplete('fromStation', 'fromList', (s) => { selectedFrom = s; });
    setupAutocomplete('toStation', 'toList', (s) => { selectedTo = s; });

    // Swap button
    document.getElementById('swapBtn').addEventListener('click', () => {
        const fromInput = document.getElementById('fromStation');
        const toInput = document.getElementById('toStation');
        const tempVal = fromInput.value;
        const tempSel = selectedFrom;
        fromInput.value = toInput.value;
        selectedFrom = selectedTo;
        toInput.value = tempVal;
        selectedTo = tempSel;
    });

    // Date defaults
    const dateInput = document.getElementById('searchDate');
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 14);
    dateInput.value = tomorrow.toISOString().split('T')[0];
    dateInput.min = new Date().toISOString().split('T')[0];

    // Search button
    document.getElementById('searchBtn').addEventListener('click', doSearch);

    // Clear recent
    document.getElementById('clearRecent').addEventListener('click', () => {
        localStorage.removeItem('trainRecentSearches');
        renderRecent();
    });

    // Render everything
    renderPopularRoutes();
    renderRecent();
    renderTips();
    renderLinks();
})();
</script>
</body>
</html>
