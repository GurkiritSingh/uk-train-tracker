<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Train Deal Finder — London ↔ Canterbury & Chelmsford</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 3px solid #3b82f6;
        }

        header h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        header p { color: #8892b0; font-size: 0.95rem; }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* Tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }

        .tab {
            padding: 10px 20px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            color: #8892b0;
            transition: all 0.2s;
        }

        .tab:hover { border-color: #3b82f6; color: #e0e0e0; }
        .tab.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Route Cards */
        .route-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .route-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        .route-card:hover { transform: translateY(-3px); border-color: #3b82f6; }

        .route-header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .route-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .route-header h3 { font-size: 1.1rem; color: #fff; }
        .route-header .route-sub { font-size: 0.8rem; color: #8892b0; margin-top: 2px; }

        .route-body { padding: 0 20px 20px; }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a4a;
        }

        .price-row:last-child { border-bottom: none; }
        .price-label { font-size: 0.85rem; color: #8892b0; }
        .price-value { font-weight: 600; }
        .price-cheap { color: #4ade80; }
        .price-mid { color: #fbbf24; }
        .price-expensive { color: #f87171; }

        .best-time {
            margin-top: 12px;
            padding: 10px 14px;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.2);
            border-radius: 8px;
            font-size: 0.85rem;
            color: #4ade80;
        }

        .best-time strong { color: #4ade80; }

        .operator-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 8px;
        }

        /* Time grid */
        .time-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .time-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 20px;
        }

        .time-card h3 {
            font-size: 1rem;
            color: #fff;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .time-bar-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .time-bar-label {
            width: 80px;
            font-size: 0.8rem;
            color: #8892b0;
            text-align: right;
            flex-shrink: 0;
        }

        .time-bar-track {
            flex: 1;
            height: 24px;
            background: #2a2a4a;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .time-bar-fill {
            height: 100%;
            border-radius: 6px;
            display: flex;
            align-items: center;
            padding-left: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #fff;
            transition: width 0.5s ease;
        }

        .time-bar-fill.cheap { background: linear-gradient(90deg, #166534, #22c55e); }
        .time-bar-fill.medium { background: linear-gradient(90deg, #713f12, #eab308); }
        .time-bar-fill.expensive { background: linear-gradient(90deg, #7f1d1d, #ef4444); }

        /* Calendar */
        .calendar-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .calendar-controls select {
            padding: 8px 14px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.9rem;
        }

        .calendar-legend {
            display: flex;
            gap: 16px;
            margin-left: auto;
            font-size: 0.8rem;
            color: #8892b0;
        }

        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 14px; height: 14px; border-radius: 3px; }

        .calendar-grid {
            display: grid;
            grid-template-columns: 40px repeat(7, 1fr);
            gap: 3px;
        }

        .cal-header {
            text-align: center;
            font-size: 0.75rem;
            color: #8892b0;
            padding: 6px 0;
            font-weight: 600;
        }

        .cal-week-label {
            font-size: 0.7rem;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cal-day {
            aspect-ratio: 1;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            cursor: pointer;
            transition: transform 0.15s;
            position: relative;
        }

        .cal-day:hover { transform: scale(1.2); z-index: 2; }
        .cal-day.empty { background: transparent; cursor: default; }
        .cal-day.cheapest { background: #166534; color: #4ade80; }
        .cal-day.cheap { background: #14532d; color: #86efac; }
        .cal-day.medium { background: #713f12; color: #fbbf24; }
        .cal-day.expensive { background: #7f1d1d; color: #fca5a5; }
        .cal-day.peak { background: #991b1b; color: #fecaca; }
        .cal-day.today { outline: 2px solid #3b82f6; outline-offset: -1px; }

        .cal-tooltip {
            display: none;
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background: #16213e;
            border: 1px solid #2a2a4a;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.78rem;
            white-space: nowrap;
            z-index: 10;
            color: #e0e0e0;
            pointer-events: none;
        }

        .cal-day:hover .cal-tooltip { display: block; }

        /* Tips */
        .tips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .tip-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 20px;
        }

        .tip-card h3 {
            font-size: 1rem;
            color: #3b82f6;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tip-card ul { list-style: none; font-size: 0.88rem; color: #8892b0; }

        .tip-card li {
            padding: 5px 0;
            padding-left: 18px;
            position: relative;
        }

        .tip-card li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: #4ade80;
        }

        /* Links */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .link-group {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 20px;
        }

        .link-group h3 {
            font-size: 1rem;
            color: #fff;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a2a4a;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            text-decoration: none;
            color: #8892b0;
            font-size: 0.9rem;
            transition: background 0.2s, color 0.2s;
            margin-bottom: 4px;
        }

        .link-item:hover { background: #2a2a4a; color: #e0e0e0; }

        .link-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .link-label { font-weight: 500; }
        .link-desc { font-size: 0.78rem; color: #555; }

        @media (max-width: 600px) {
            header h1 { font-size: 1.4rem; }
            .route-grid, .tips-grid, .links-grid, .time-grid { grid-template-columns: 1fr; }
            .calendar-legend { margin-left: 0; }
            .calendar-controls { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <header>
        <h1>UK Train Deal Finder</h1>
        <p>London ↔ Canterbury &amp; Chelmsford — find the cheapest fares</p>
    </header>

    <div class="container">
        <div class="tabs">
            <div class="tab active" data-tab="routes">Routes & Prices</div>
            <div class="tab" data-tab="timetable">Best Times to Travel</div>
            <div class="tab" data-tab="calendar">Price Calendar</div>
            <div class="tab" data-tab="tips">Booking Tips</div>
            <div class="tab" data-tab="links">Links</div>
        </div>

        <!-- ROUTES TAB -->
        <div class="tab-content active" id="routes">
            <div class="route-grid" id="routeGrid"></div>
        </div>

        <!-- TIMETABLE TAB -->
        <div class="tab-content" id="timetable">
            <p style="color:#8892b0; margin-bottom: 8px; font-size:0.9rem;">Prices vary by time of day. Off-peak and super off-peak trains are significantly cheaper.</p>
            <div class="time-grid" id="timeGrid"></div>
        </div>

        <!-- CALENDAR TAB -->
        <div class="tab-content" id="calendar">
            <div class="calendar-controls">
                <select id="calMonth"></select>
                <select id="calRoute"></select>
                <div class="calendar-legend">
                    <div class="legend-item"><div class="legend-dot" style="background:#166534"></div> Cheapest</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#14532d"></div> Cheap</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#713f12"></div> Medium</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#7f1d1d"></div> Expensive</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#991b1b"></div> Peak</div>
                </div>
            </div>
            <div class="calendar-grid" id="calGrid"></div>
        </div>

        <!-- TIPS TAB -->
        <div class="tab-content" id="tips">
            <div class="tips-grid" id="tipsGrid"></div>
        </div>

        <!-- LINKS TAB -->
        <div class="tab-content" id="links">
            <div class="links-grid" id="linksGrid"></div>
        </div>
    </div>

<script>
// ── Route Data ──
const routes = [
    {
        name: "London → Canterbury",
        from: "London St Pancras / Victoria",
        to: "Canterbury West / East",
        icon: "🏛️",
        color: "#8b5cf6",
        operator: "Southeastern",
        operatorColor: "#0072bc",
        duration: "55 min – 1h 30m",
        advance: "£10 – £18",
        offPeak: "£22.40",
        anytime: "£34.90",
        season: "£4,316/yr",
        bestTip: "Advance singles from £10 if booked 2-4 weeks ahead via Southeastern",
        advanceNum: 14,
        offPeakNum: 22.4,
        anytimeNum: 34.9
    },
    {
        name: "Canterbury → London",
        from: "Canterbury West / East",
        to: "London St Pancras / Victoria",
        icon: "🏛️",
        color: "#a78bfa",
        operator: "Southeastern",
        operatorColor: "#0072bc",
        duration: "55 min – 1h 30m",
        advance: "£10 – £18",
        offPeak: "£22.40",
        anytime: "£34.90",
        season: "£4,316/yr",
        bestTip: "Same prices as outbound — book return as 2 singles for flexibility",
        advanceNum: 14,
        offPeakNum: 22.4,
        anytimeNum: 34.9
    },
    {
        name: "London → Chelmsford",
        from: "London Liverpool Street",
        to: "Chelmsford",
        icon: "🚂",
        color: "#3b82f6",
        operator: "Greater Anglia",
        operatorColor: "#e31837",
        duration: "30 – 40 min",
        advance: "£5 – £12",
        offPeak: "£14.80",
        anytime: "£23.60",
        season: "£3,500/yr",
        bestTip: "Advance singles from £5 — one of the cheapest London commuter routes",
        advanceNum: 8.5,
        offPeakNum: 14.8,
        anytimeNum: 23.6
    },
    {
        name: "Chelmsford → London",
        from: "Chelmsford",
        to: "London Liverpool Street",
        icon: "🚂",
        color: "#60a5fa",
        operator: "Greater Anglia",
        operatorColor: "#e31837",
        duration: "30 – 40 min",
        advance: "£5 – £12",
        offPeak: "£14.80",
        anytime: "£23.60",
        season: "£3,500/yr",
        bestTip: "Same prices as outbound — book 2 singles instead of a return for best deals",
        advanceNum: 8.5,
        offPeakNum: 14.8,
        anytimeNum: 23.6
    }
];

// ── Time-of-day pricing ──
const timeSlots = [
    { label: "06:00–07:00", canterbury: { price: "£34.90", level: "expensive" }, chelmsford: { price: "£23.60", level: "expensive" } },
    { label: "07:00–09:30", canterbury: { price: "£34.90", level: "expensive" }, chelmsford: { price: "£23.60", level: "expensive" } },
    { label: "09:30–10:00", canterbury: { price: "£22.40", level: "medium" }, chelmsford: { price: "£14.80", level: "medium" } },
    { label: "10:00–15:30", canterbury: { price: "£15–£18", level: "cheap" }, chelmsford: { price: "£8–£12", level: "cheap" } },
    { label: "15:30–18:00", canterbury: { price: "£34.90", level: "expensive" }, chelmsford: { price: "£23.60", level: "expensive" } },
    { label: "18:00–19:00", canterbury: { price: "£22.40", level: "medium" }, chelmsford: { price: "£14.80", level: "medium" } },
    { label: "19:00–23:00", canterbury: { price: "£15–£18", level: "cheap" }, chelmsford: { price: "£8–£12", level: "cheap" } },
];

const barWidths = { cheap: 35, medium: 60, expensive: 95 };

// ── School holidays & bank holidays ──
const schoolHolidays2026 = [
    { start: new Date(2026, 1, 16), end: new Date(2026, 1, 20), name: "Feb Half-Term" },
    { start: new Date(2026, 2, 30), end: new Date(2026, 3, 13), name: "Easter" },
    { start: new Date(2026, 4, 25), end: new Date(2026, 4, 29), name: "May Half-Term" },
    { start: new Date(2026, 6, 22), end: new Date(2026, 8, 2), name: "Summer Holidays" },
    { start: new Date(2026, 9, 26), end: new Date(2026, 9, 30), name: "Oct Half-Term" },
    { start: new Date(2026, 11, 21), end: new Date(2027, 0, 2), name: "Christmas" }
];

const bankHolidays2026 = [
    new Date(2026, 0, 1), new Date(2026, 3, 3), new Date(2026, 3, 6),
    new Date(2026, 4, 4), new Date(2026, 4, 25), new Date(2026, 7, 31),
    new Date(2026, 11, 25), new Date(2026, 11, 28)
];

const majorEvents2026 = [
    { date: new Date(2026, 5, 26), name: "Wimbledon starts" },
    { date: new Date(2026, 7, 28), name: "Notting Hill Carnival" },
];

function isSchoolHoliday(date) {
    return schoolHolidays2026.find(h => date >= h.start && date <= h.end);
}

function isBankHoliday(date) {
    return bankHolidays2026.some(bh =>
        bh.getFullYear() === date.getFullYear() &&
        bh.getMonth() === date.getMonth() &&
        bh.getDate() === date.getDate()
    );
}

function getPriceLevel(date, routeIdx) {
    const day = date.getDay();
    const isWeekend = day === 0 || day === 6;
    const isFriday = day === 5;
    const holiday = isSchoolHoliday(date);
    const bankHol = isBankHoliday(date);
    const r = routes[routeIdx] || routes[0];

    if (bankHol) return { level: "peak", label: "Peak day", est: r.anytime };
    if (holiday && (isWeekend || isFriday)) return { level: "peak", label: "Peak (holiday + weekend)", est: r.anytime };
    if (holiday) return { level: "expensive", label: "Busy (school holiday)", est: "£" + (r.offPeakNum + 5).toFixed(0) };
    if (isFriday) return { level: "medium", label: "Friday — busier", est: r.offPeak };
    if (isWeekend) return { level: "cheap", label: "Weekend off-peak", est: r.offPeak };
    if (day === 2 || day === 3) return { level: "cheapest", label: "Quietest day — Advance fares available", est: r.advance };
    return { level: "cheap", label: "Weekday — Advance fares likely", est: r.advance };
}

// ── Render Routes ──
function renderRoutes() {
    document.getElementById('routeGrid').innerHTML = routes.map(r => `
        <div class="route-card">
            <div class="route-header">
                <div class="route-icon" style="background:${r.color}22; color:${r.color}">${r.icon}</div>
                <div>
                    <h3>${r.name}</h3>
                    <div class="route-sub">${r.from} → ${r.to} · ${r.duration}</div>
                </div>
            </div>
            <div class="route-body">
                <span class="operator-badge" style="background:${r.operatorColor}22; color:${r.operatorColor}">${r.operator}</span>
                <div style="margin-top:12px">
                    <div class="price-row">
                        <span class="price-label">Advance (book early)</span>
                        <span class="price-value price-cheap">${r.advance}</span>
                    </div>
                    <div class="price-row">
                        <span class="price-label">Off-Peak</span>
                        <span class="price-value price-mid">${r.offPeak}</span>
                    </div>
                    <div class="price-row">
                        <span class="price-label">Anytime (walk-up)</span>
                        <span class="price-value price-expensive">${r.anytime}</span>
                    </div>
                    <div class="price-row">
                        <span class="price-label">Season ticket</span>
                        <span class="price-value" style="color:#8892b0">${r.season}</span>
                    </div>
                </div>
                <div class="best-time">
                    <strong>Best deal:</strong> ${r.bestTip}
                </div>
            </div>
        </div>
    `).join('');
}

// ── Render Time Grid ──
function renderTimeGrid() {
    const grid = document.getElementById('timeGrid');
    const routeGroups = [
        { title: "🏛️ London ↔ Canterbury", key: "canterbury" },
        { title: "🚂 London ↔ Chelmsford", key: "chelmsford" }
    ];

    grid.innerHTML = routeGroups.map(rg => `
        <div class="time-card">
            <h3>${rg.title}</h3>
            ${timeSlots.map(s => {
                const d = s[rg.key];
                return `
                <div class="time-bar-row">
                    <div class="time-bar-label">${s.label}</div>
                    <div class="time-bar-track">
                        <div class="time-bar-fill ${d.level}" style="width:${barWidths[d.level]}%">${d.price}</div>
                    </div>
                </div>`;
            }).join('')}
            <div style="margin-top:12px; font-size:0.8rem; color:#8892b0;">
                <strong style="color:#4ade80;">Sweet spot:</strong> Travel between 10:00–15:30 or after 19:00 for cheapest fares
            </div>
        </div>
    `).join('');
}

// ── Render Calendar ──
function renderCalendar() {
    const month = parseInt(document.getElementById('calMonth').value);
    const routeIdx = parseInt(document.getElementById('calRoute').value);
    const year = 2026;
    const grid = document.getElementById('calGrid');

    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const startDow = (firstDay.getDay() + 6) % 7;
    const today = new Date();

    let html = '<div class="cal-header"></div>';
    ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
        html += `<div class="cal-header">${d}</div>`;
    });

    let dayNum = 1;
    const totalCells = startDow + lastDay.getDate();
    const rows = Math.ceil(totalCells / 7);

    for (let w = 0; w < rows; w++) {
        html += `<div class="cal-week-label">W${w+1}</div>`;
        for (let d = 0; d < 7; d++) {
            const cellIndex = w * 7 + d;
            if (cellIndex < startDow || dayNum > lastDay.getDate()) {
                html += '<div class="cal-day empty"></div>';
            } else {
                const date = new Date(year, month, dayNum);
                const price = getPriceLevel(date, routeIdx);
                const holiday = isSchoolHoliday(date);
                const bankHol = isBankHoliday(date);
                const isToday = date.toDateString() === today.toDateString();

                let tooltip = `${date.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' })} — ${price.label}`;
                tooltip += ` · Est: ${price.est}`;
                if (holiday) tooltip += ` (${holiday.name})`;
                if (bankHol) tooltip += ' (Bank Holiday)';

                html += `<div class="cal-day ${price.level}${isToday ? ' today' : ''}">
                    ${dayNum}
                    <div class="cal-tooltip">${tooltip}</div>
                </div>`;
                dayNum++;
            }
        }
    }

    grid.innerHTML = html;
}

function initCalendar() {
    const monthSelect = document.getElementById('calMonth');
    const routeSelect = document.getElementById('calRoute');
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const now = new Date();

    monthSelect.innerHTML = months.map((m, i) =>
        `<option value="${i}" ${i === now.getMonth() ? 'selected' : ''}>${m} 2026</option>`
    ).join('');

    routeSelect.innerHTML = routes.map((r, i) =>
        `<option value="${i}">${r.icon} ${r.name}</option>`
    ).join('');

    monthSelect.addEventListener('change', renderCalendar);
    routeSelect.addEventListener('change', renderCalendar);
    renderCalendar();
}
